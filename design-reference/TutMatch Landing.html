<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TutMatch — Tutors and parents, no middleman</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --tutor-bg: #1a1410;
    --tutor-bg-2: #221912;
    --tutor-ink: #f4ecdf;
    --tutor-mute: #8d7c66;
    --tutor-accent: oklch(0.80 0.13 78);
    --tutor-accent-soft: oklch(0.80 0.13 78 / 0.18);

    --parent-bg: #0c1820;
    --parent-bg-2: #122530;
    --parent-ink: #e6f0ee;
    --parent-mute: #6c8a8b;
    --parent-accent: oklch(0.84 0.09 165);
    --parent-accent-soft: oklch(0.84 0.09 165 / 0.18);

    --paper: #f5f1ea;
    --paper-2: #ebe5da;
    --ink: #1a1410;
    --ink-mute: #6e6253;
    --rule: rgba(26,20,16,0.14);

    --serif: "Fraunces", "Source Serif Pro", ui-serif, Georgia, serif;
    --sans: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
    --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  a { color: inherit; text-decoration: none; }
  button { font: inherit; }

  /* ────────── Sticky header ────────── */
  .stickybar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    background: rgba(245,241,234,0.85);
    backdrop-filter: blur(14px) saturate(160%);
    -webkit-backdrop-filter: blur(14px) saturate(160%);
    border-bottom: 0.5px solid var(--rule);
    transform: translateY(-110%);
    transition: transform 0.4s var(--ease);
    font-family: var(--sans);
  }
  .stickybar.show { transform: translateY(0); }
  .stickybar .wordmark { font-family: var(--serif); font-weight: 600; font-size: 19px; letter-spacing: -0.01em; }
  .stickybar .ctas { display: flex; gap: 10px; }
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 16px; border-radius: 999px;
    font-size: 13px; font-weight: 500; letter-spacing: -0.005em;
    border: 1px solid transparent;
    transition: all 0.25s var(--ease);
    cursor: pointer;
  }
  .pill.tutor { background: var(--tutor-accent); color: #1a1410; }
  .pill.tutor:hover { transform: translateY(-1px); box-shadow: 0 6px 18px -8px rgba(26,20,16,0.4); }
  .pill.parent { background: var(--parent-accent); color: #0c1820; }
  .pill.parent:hover { transform: translateY(-1px); box-shadow: 0 6px 18px -8px rgba(12,24,32,0.4); }
  .pill.ghost { background: transparent; border-color: var(--rule); color: var(--ink); }
  .pill.ghost:hover { background: rgba(26,20,16,0.05); }

  /* ────────── Hero split ────────── */
  .hero {
    position: relative; width: 100%; height: 100vh; min-height: 640px;
    display: flex;
    overflow: hidden;
  }
  .hero-half {
    position: relative; flex: 1 1 50%;
    transition: flex-basis 0.6s var(--ease), filter 0.6s var(--ease);
    overflow: hidden;
    display: flex; align-items: center;
    cursor: pointer;
    outline: none;
  }
  .hero-half:focus-visible { box-shadow: inset 0 0 0 3px #fff; }
  .hero.lean-left .hero-half.tutor { flex-basis: 58%; }
  .hero.lean-left .hero-half.parent { flex-basis: 42%; filter: brightness(0.78) saturate(0.9); }
  .hero.lean-right .hero-half.parent { flex-basis: 58%; }
  .hero.lean-right .hero-half.tutor { flex-basis: 42%; filter: brightness(0.78) saturate(0.9); }

  .hero-half.tutor { background: var(--tutor-bg); color: var(--tutor-ink); }
  .hero-half.parent { background: var(--parent-bg); color: var(--parent-ink); }

  /* subtle texture / ambient */
  .hero-half::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(60% 80% at var(--mx, 50%) var(--my, 40%), rgba(255,255,255,0.06), transparent 60%),
      radial-gradient(40% 60% at 80% 90%, rgba(0,0,0,0.35), transparent 60%);
    pointer-events: none;
    transition: opacity 0.6s var(--ease);
  }
  .hero-half.tutor::after, .hero-half.parent::after {
    content: ""; position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 6px);
    pointer-events: none;
  }

  .hero-content {
    position: relative; z-index: 2;
    padding: 7vh 7vw 9vh;
    max-width: 640px;
    transition: transform 0.6s var(--ease);
  }
  .hero-half.tutor .hero-content { padding-right: 5vw; }
  .hero-half.parent .hero-content { padding-left: 5vw; margin-left: auto; }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 28px;
  }
  .eyebrow .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }
  .hero-half.tutor .eyebrow { color: var(--tutor-accent); }
  .hero-half.parent .eyebrow { color: var(--parent-accent); }

  .hero h1 {
    font-family: var(--serif);
    font-weight: 350;
    font-variation-settings: "opsz" 96, "SOFT" 30;
    font-size: clamp(38px, 5vw, 80px);
    line-height: 1.05;
    letter-spacing: -0.022em;
    margin: 0 0 32px;
    max-width: 11ch;
  }
  .hero h1 em {
    font-style: italic; font-weight: 300;
  }
  .hero-half.tutor h1 em { color: var(--tutor-accent); }
  .hero-half.parent h1 em { color: var(--parent-accent); }

  .hero .subhead {
    font-size: clamp(16px, 1.2vw, 19px);
    line-height: 1.5;
    max-width: 460px;
    margin: 0 0 36px;
    opacity: 0.78;
    text-wrap: pretty;
  }

  .hero-cta {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 16px 24px;
    border-radius: 999px;
    font-size: 14.5px; font-weight: 500;
    letter-spacing: -0.005em;
    transition: all 0.3s var(--ease);
  }
  .hero-half.tutor .hero-cta {
    background: var(--tutor-accent); color: #1a1410;
  }
  .hero-half.parent .hero-cta {
    background: var(--parent-accent); color: #0c1820;
  }
  .hero-cta:hover { transform: translateY(-2px); }
  .hero-cta .arr {
    transition: transform 0.3s var(--ease);
  }
  .hero-half:hover .hero-cta .arr { transform: translateX(4px); }

  /* meta line under CTA */
  .hero-meta {
    display: flex; align-items: center; gap: 14px;
    margin-top: 20px;
    font-size: 12.5px; opacity: 0.55;
  }
  .hero-meta .dot { width: 3px; height: 3px; border-radius: 999px; background: currentColor; }

  /* floating accents */
  .floats { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
  .float-chip {
    position: absolute;
    font-family: var(--serif); font-style: italic; font-weight: 300;
    font-size: clamp(14px, 1.05vw, 17px);
    padding: 10px 16px;
    border-radius: 999px;
    border: 0.5px solid currentColor;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.7s var(--ease), transform 1.4s var(--ease);
    white-space: nowrap;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .hero-half.tutor .float-chip { color: var(--tutor-accent); background: rgba(26,20,16,0.35); }
  .hero-half.parent .float-chip { color: var(--parent-accent); background: rgba(12,24,32,0.35); }
  .hero-half.engaged .float-chip {
    opacity: 0.92;
    transform: translateY(-30px);
  }
  .float-chip.f1 { top: 22%; right: 8%; transition-delay: 0.05s; }
  .float-chip.f2 { top: 42%; right: 14%; transition-delay: 0.18s; }
  .float-chip.f3 { top: 64%; right: 6%; transition-delay: 0.32s; }
  .hero-half.parent .float-chip.f1 { left: 10%; right: auto; top: 18%; }
  .hero-half.parent .float-chip.f2 { left: 4%; right: auto; top: 40%; }
  .hero-half.parent .float-chip.f3 { left: 12%; right: auto; top: 62%; }

  /* divider + wordmark */
  .divider {
    position: absolute; top: 0; bottom: 0; left: 50%;
    width: 0.5px; background: rgba(255,255,255,0.1);
    transform: translateX(-50%);
    z-index: 5;
    transition: left 0.6s var(--ease);
  }
  .hero.lean-left .divider { left: 58%; }
  .hero.lean-right .divider { left: 42%; }
  .wordmark-center {
    position: absolute; top: 36px; left: 50%; transform: translateX(-50%);
    z-index: 10;
    display: flex; align-items: center; gap: 10px;
    color: #fff;
    font-family: var(--serif);
    font-weight: 500;
    font-size: 20px;
    letter-spacing: -0.01em;
    mix-blend-mode: difference;
    pointer-events: none;
  }
  .wordmark-center .glyph {
    width: 26px; height: 26px;
    border: 1px solid currentColor; border-radius: 999px;
    display: grid; place-items: center;
    font-style: italic; font-weight: 400;
    font-size: 14px;
  }

  /* hero footer micro line */
  .hero-foot {
    position: absolute; bottom: 24px; left: 0; right: 0;
    display: flex; justify-content: space-between;
    padding: 0 32px;
    z-index: 4;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    pointer-events: none;
  }
  .hero-foot .l { color: rgba(244,236,223,0.45); }
  .hero-foot .r { color: rgba(230,240,238,0.45); }

  /* ────────── School picker bar ────────── */
  .schoolbar {
    background: var(--ink);
    color: var(--paper);
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
    padding: 22px 6vw;
  }
  .schoolbar-inner {
    display: flex; align-items: center; justify-content: space-between;
    gap: 32px;
    flex-wrap: wrap;
  }
  .schoolbar-l { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .sb-label {
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(245,241,234,0.45);
  }
  .sb-school {
    font-family: var(--serif); font-weight: 400; font-style: italic;
    font-size: 22px;
    letter-spacing: -0.01em;
    display: inline-flex; align-items: baseline; gap: 10px;
    transition: color 0.3s var(--ease);
  }
  .sb-dot {
    width: 7px; height: 7px; border-radius: 999px;
    align-self: center;
    transition: background 0.3s var(--ease);
  }
  .sb-tag {
    font-size: 12.5px; color: rgba(245,241,234,0.5);
    font-style: italic;
    font-family: var(--serif);
  }
  .schoolbar-r { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .sb-switch-lbl {
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(245,241,234,0.45);
  }
  .sb-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .sb-chip {
    appearance: none;
    padding: 7px 13px;
    border-radius: 999px;
    background: transparent;
    border: 0.5px solid rgba(245,241,234,0.18);
    color: rgba(245,241,234,0.7);
    font-size: 12.5px; font-weight: 500;
    font-family: var(--sans);
    cursor: pointer;
    transition: all 0.25s var(--ease);
    letter-spacing: -0.005em;
  }
  .sb-chip:hover { background: rgba(245,241,234,0.06); color: var(--paper); border-color: rgba(245,241,234,0.32); }
  .sb-chip.active { font-weight: 600; }

  @media (max-width: 900px) {
    .schoolbar-inner { gap: 18px; }
    .sb-school { font-size: 18px; }
    .schoolbar-l { gap: 10px; }
  }

  /* ────────── Pitch line ────────── */
  .pitch {
    padding: clamp(80px, 14vh, 180px) 6vw;
    background: var(--paper);
    text-align: left;
    border-bottom: 0.5px solid var(--rule);
  }
  .pitch p {
    font-family: var(--serif);
    font-weight: 300;
    font-variation-settings: "opsz" 96, "SOFT" 50;
    font-size: clamp(34px, 4.4vw, 76px);
    line-height: 1.12;
    letter-spacing: -0.025em;
    max-width: 1400px;
    margin: 0 0 24px;
    color: var(--ink);
    text-wrap: balance;
  }
  .pitch .num {
    font-style: italic; font-weight: 400;
    background: linear-gradient(180deg, oklch(0.7 0.16 28), oklch(0.55 0.18 28));
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
    font-variant-numeric: tabular-nums;
  }
  .pitch .accent-num {
    font-style: italic; font-weight: 400;
    color: oklch(0.55 0.15 145);
    font-variant-numeric: tabular-nums;
  }
  .pitch .footnote {
    margin-top: 32px;
    font-family: var(--sans);
    font-size: 13px; color: var(--ink-mute);
    letter-spacing: 0.02em;
  }

  /* ────────── Section scaffolding ────────── */
  section { position: relative; }
  .section-pad { padding: clamp(80px, 12vh, 140px) 6vw; }
  .container { max-width: 1280px; margin: 0 auto; }
  .label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 28px;
    display: flex; align-items: center; gap: 12px;
  }
  .label::before {
    content: ""; width: 24px; height: 1px; background: var(--ink-mute);
  }
  .h2 {
    font-family: var(--serif); font-weight: 350;
    font-variation-settings: "opsz" 96, "SOFT" 40;
    font-size: clamp(32px, 3.6vw, 60px);
    line-height: 1.12;
    letter-spacing: -0.02em;
    margin: 0 0 28px;
    text-wrap: balance;
  }
  .h2 em { font-style: italic; font-weight: 300; color: oklch(0.55 0.18 28); }
  .lede {
    font-size: clamp(15px, 1.1vw, 18px);
    line-height: 1.55;
    max-width: 640px;
    color: var(--ink-mute);
    margin: 0;
  }

  /* ────────── The $20 mechanic ────────── */
  .mechanic {
    background: #f8f4ec;
    border-bottom: 0.5px solid var(--rule);
  }
  .mechanic-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    margin-top: 56px;
    border-top: 0.5px solid var(--rule);
    border-bottom: 0.5px solid var(--rule);
  }
  .step {
    padding: 44px 36px 52px;
    border-right: 0.5px solid var(--rule);
    position: relative;
    background: #fbf8f1;
  }
  .step:last-child { border-right: 0; }
  .step .n {
    font-family: var(--serif); font-weight: 300; font-style: italic;
    font-size: 64px; line-height: 1; color: oklch(0.55 0.15 75);
    margin-bottom: 32px;
    font-variant-numeric: tabular-nums;
  }
  .step h3 {
    font-family: var(--serif); font-weight: 400;
    font-size: 24px; line-height: 1.2;
    letter-spacing: -0.015em;
    margin: 0 0 14px;
  }
  .step p {
    font-size: 14.5px; line-height: 1.55;
    color: var(--ink-mute);
    margin: 0;
  }
  .step .figure {
    margin-top: 28px;
    height: 110px;
    border: 0.5px dashed var(--rule);
    background:
      repeating-linear-gradient(135deg,
        rgba(26,20,16,0.04) 0 8px,
        transparent 8px 16px);
    border-radius: 6px;
    display: grid; place-items: center;
    font-family: var(--sans);
    color: var(--ink-mute);
    font-size: 12px;
    letter-spacing: 0.05em;
  }
  .honesty {
    margin-top: 36px;
    padding: 28px 32px;
    background: #1a1410;
    color: #f5f1ea;
    border-radius: 6px;
    display: flex; gap: 24px; align-items: flex-start;
    max-width: 980px;
  }
  .honesty .tag {
    flex: 0 0 auto;
    font-family: var(--serif); font-style: italic; font-weight: 400;
    color: var(--tutor-accent);
    font-size: 14px;
    padding-top: 2px;
  }
  .honesty p {
    margin: 0;
    font-size: 15px; line-height: 1.55;
    color: rgba(245,241,234,0.85);
    text-wrap: pretty;
  }

  /* the receipt visual */
  .receipt {
    margin-top: 28px;
    padding: 22px 24px;
    background: #fff;
    border: 0.5px solid var(--rule);
    border-radius: 6px;
    font-family: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    line-height: 1.7;
    color: var(--ink);
  }
  .receipt .row { display: flex; justify-content: space-between; }
  .receipt .row.muted { color: var(--ink-mute); }
  .receipt .row.total { border-top: 1px solid var(--rule); margin-top: 8px; padding-top: 8px; font-weight: 600; }
  .receipt .row .neg { color: oklch(0.55 0.15 145); }
  .receipt .row .pos { color: oklch(0.55 0.18 28); }

  /* ────────── How it works mirrored ────────── */
  .how {
    background: var(--paper);
    border-bottom: 0.5px solid var(--rule);
  }
  .how-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0;
    margin-top: 48px;
    border: 0.5px solid var(--rule);
    border-radius: 8px;
    overflow: hidden;
  }
  .how-col {
    padding: 40px 36px 48px;
    background: #fbf8f1;
  }
  .how-col.tutor-col {
    background: var(--tutor-bg);
    color: var(--tutor-ink);
  }
  .how-col.parent-col {
    background: var(--parent-bg);
    color: var(--parent-ink);
  }
  .how-col .role {
    font-family: var(--serif); font-style: italic; font-weight: 400;
    font-size: 14px;
    margin-bottom: 4px;
    opacity: 0.7;
  }
  .how-col .ctitle {
    font-family: var(--serif); font-weight: 400;
    font-size: 30px; line-height: 1.1;
    letter-spacing: -0.015em;
    margin-bottom: 32px;
  }
  .how-col.tutor-col .ctitle { color: var(--tutor-accent); }
  .how-col.parent-col .ctitle { color: var(--parent-accent); }
  .how-col ol {
    list-style: none; margin: 0; padding: 0;
    counter-reset: s;
  }
  .how-col ol li {
    counter-increment: s;
    display: grid; grid-template-columns: 32px 1fr;
    gap: 18px;
    padding: 18px 0;
    border-top: 0.5px solid currentColor;
    border-top-color: rgba(255,255,255,0.1);
    font-size: 15px; line-height: 1.45;
  }
  .how-col ol li:first-child { border-top: 0; }
  .how-col ol li::before {
    content: counter(s, decimal-leading-zero);
    font-family: var(--serif); font-style: italic; font-weight: 300;
    font-size: 18px;
    opacity: 0.55;
    font-variant-numeric: tabular-nums;
    padding-top: 2px;
  }
  .how-col ol li b { font-weight: 600; }
  .how-col.tutor-col ol li b { color: var(--tutor-accent); }
  .how-col.parent-col ol li b { color: var(--parent-accent); }

  /* ────────── Comparison ────────── */
  .compare {
    background: #f8f4ec;
    border-bottom: 0.5px solid var(--rule);
  }
  .compare-table {
    margin-top: 48px;
    border: 0.5px solid var(--rule);
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
  }
  .compare-row {
    display: grid; grid-template-columns: 1.3fr 1fr 1fr;
    border-bottom: 0.5px solid var(--rule);
  }
  .compare-row:last-child { border-bottom: 0; }
  .compare-row > div {
    padding: 18px 24px;
    font-size: 14.5px; line-height: 1.45;
  }
  .compare-row .label-cell {
    background: #fbf8f1;
    border-right: 0.5px solid var(--rule);
    font-weight: 500;
    color: var(--ink);
    font-size: 13.5px;
  }
  .compare-row .centre {
    border-right: 0.5px solid var(--rule);
    color: var(--ink-mute);
  }
  .compare-row .us {
    color: var(--ink);
    font-weight: 500;
  }
  .compare-row .centre .x, .compare-row .us .v {
    display: inline-block; margin-right: 8px;
    width: 16px; height: 16px; border-radius: 999px;
    text-align: center; line-height: 16px;
    font-size: 10px; font-weight: 600;
    vertical-align: -2px;
  }
  .compare-row .centre .x { background: oklch(0.92 0.04 28); color: oklch(0.45 0.16 28); }
  .compare-row .us .v { background: oklch(0.9 0.06 145); color: oklch(0.4 0.15 145); }
  .compare-row.head {
    background: #1a1410;
  }
  .compare-row.head > div {
    padding: 20px 24px;
    font-family: var(--serif); font-weight: 500;
    font-size: 16px;
    color: #f5f1ea;
    border-right-color: rgba(255,255,255,0.15);
  }
  .compare-row.head .label-cell { background: transparent; color: rgba(245,241,234,0.5); font-family: var(--sans); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 500; }
  .compare-row.head .us { color: var(--tutor-accent); }

  /* ────────── Trust & safety ────────── */
  .trust {
    background: var(--ink);
    color: var(--paper);
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
  }
  .trust .label { color: rgba(245,241,234,0.55); }
  .trust .label::before { background: rgba(245,241,234,0.4); }
  .trust .h2 { color: #fff; }
  .trust .lede { color: rgba(245,241,234,0.7); }
  .trust-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    margin-top: 56px;
    background: rgba(255,255,255,0.08);
    border: 0.5px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    overflow: hidden;
  }
  .trust-cell {
    background: var(--ink);
    padding: 32px 28px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .trust-cell .ico {
    width: 36px; height: 36px;
    border: 0.5px solid rgba(255,255,255,0.2);
    border-radius: 999px;
    display: grid; place-items: center;
    color: var(--tutor-accent);
  }
  .trust-cell h3 {
    font-family: var(--serif); font-weight: 400;
    font-size: 18px; margin: 0;
    color: #fff;
    letter-spacing: -0.01em;
  }
  .trust-cell p {
    font-size: 13.5px; line-height: 1.5;
    color: rgba(245,241,234,0.65);
    margin: 0;
  }

  /* ────────── Guarantee callout ────────── */
  .guarantee {
    background: var(--paper);
    padding: clamp(60px, 9vh, 110px) 6vw;
  }
  .guarantee-card {
    max-width: 1100px; margin: 0 auto;
    display: grid; grid-template-columns: auto 1fr auto;
    align-items: center; gap: 40px;
    padding: 40px 48px;
    background: oklch(0.95 0.05 145);
    border: 0.5px solid oklch(0.75 0.08 145);
    border-radius: 12px;
  }
  .guarantee .badge {
    width: 84px; height: 84px;
    border-radius: 999px;
    background: oklch(0.55 0.15 145);
    color: #fff;
    display: grid; place-items: center;
    font-family: var(--serif);
    font-weight: 400; font-style: italic;
    font-size: 26px;
    line-height: 1;
    flex-direction: column;
    text-align: center;
  }
  .guarantee .badge small {
    display: block;
    font-family: var(--sans); font-style: normal;
    font-size: 9px; letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
    margin-top: 2px;
    opacity: 0.85;
  }
  .guarantee .body h3 {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(22px, 2.2vw, 30px);
    line-height: 1.15;
    letter-spacing: -0.015em;
    margin: 0 0 10px;
    color: var(--ink);
  }
  .guarantee .body p {
    font-size: 14.5px; line-height: 1.55;
    color: var(--ink-mute);
    margin: 0;
    max-width: 560px;
  }

  /* ────────── Sample tutor cards ────────── */
  .tutors {
    background: #f8f4ec;
    border-bottom: 0.5px solid var(--rule);
  }
  .tutor-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-top: 56px;
  }
  .tcard {
    background: #fff;
    border: 0.5px solid var(--rule);
    border-radius: 10px;
    padding: 22px;
    display: flex; flex-direction: column; gap: 16px;
    position: relative;
    transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
  }
  .tcard:hover { transform: translateY(-3px); box-shadow: 0 18px 40px -20px rgba(26,20,16,0.18); }
  .tcard .example {
    position: absolute; top: 14px; right: 14px;
    font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-mute);
    padding: 4px 8px;
    border: 0.5px solid var(--rule);
    border-radius: 999px;
  }
  .tcard .ph {
    width: 64px; height: 64px;
    border-radius: 999px;
    background:
      repeating-linear-gradient(135deg, var(--paper-2) 0 6px, #ddd5c5 6px 12px);
    display: grid; place-items: center;
    font-family: var(--serif); font-style: italic;
    color: var(--ink-mute);
    font-size: 22px;
  }
  .tcard h4 {
    font-family: var(--serif); font-weight: 400;
    font-size: 19px; margin: 0;
    letter-spacing: -0.01em;
  }
  .tcard .meta {
    font-size: 12px; color: var(--ink-mute);
    display: flex; align-items: center; gap: 8px;
  }
  .tcard .meta .dot { width: 3px; height: 3px; border-radius: 999px; background: currentColor; }
  .tcard .subs {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 4px;
  }
  .tcard .sub {
    font-size: 11.5px;
    padding: 5px 10px;
    background: #fbf8f1;
    border: 0.5px solid var(--rule);
    border-radius: 4px;
    color: var(--ink);
    font-family: var(--sans);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .tcard .sub b { font-family: var(--serif); font-style: italic; font-weight: 500; color: oklch(0.5 0.16 75); }
  .tcard .row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: auto;
    padding-top: 14px;
    border-top: 0.5px solid var(--rule);
  }
  .tcard .rate {
    font-family: var(--serif); font-weight: 400;
    font-size: 22px;
    letter-spacing: -0.01em;
  }
  .tcard .rate small { font-size: 12px; color: var(--ink-mute); font-family: var(--sans); font-weight: 400; }
  .tcard .unlock {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    background: var(--ink);
    color: var(--paper);
    border-radius: 999px;
    font-size: 12.5px; font-weight: 500;
    cursor: pointer;
    transition: all 0.25s var(--ease);
  }
  .tcard .unlock:hover { background: var(--tutor-accent); color: var(--ink); }
  .tcard .atar {
    font-size: 11.5px;
    background: oklch(0.92 0.07 75);
    border: 0.5px solid oklch(0.75 0.1 75);
    padding: 3px 8px;
    border-radius: 4px;
    color: oklch(0.4 0.14 75);
    font-weight: 500;
  }
  .tcard .mode {
    font-size: 11px;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* ────────── Earnings contrast ────────── */
  .earnings {
    background: var(--tutor-bg);
    color: var(--tutor-ink);
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
  }
  .earnings .label { color: rgba(244,236,223,0.5); }
  .earnings .label::before { background: rgba(244,236,223,0.4); }
  .earnings .h2 { color: var(--tutor-ink); }
  .earnings .h2 em { color: var(--tutor-accent); }
  .earnings .lede { color: rgba(244,236,223,0.7); }

  .earn-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-top: 56px;
  }
  .earn-card {
    padding: 36px;
    border-radius: 10px;
    border: 0.5px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.025);
    display: flex; flex-direction: column; gap: 18px;
  }
  .earn-card.us { background: var(--tutor-accent); color: var(--tutor-bg); border-color: var(--tutor-accent); }
  .earn-card .tag {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    opacity: 0.7;
    font-weight: 500;
  }
  .earn-card .big {
    font-family: var(--serif); font-weight: 350;
    font-variation-settings: "opsz" 96;
    font-size: clamp(40px, 4vw, 64px);
    line-height: 1.1;
    letter-spacing: -0.025em;
  }
  .earn-card .big em { font-style: italic; font-weight: 300; font-size: 0.5em; opacity: 0.65; }
  .earn-card .copy {
    font-size: 14.5px; line-height: 1.55;
    opacity: 0.78;
    margin: 0;
  }
  .earn-card .term {
    margin-top: 8px;
    padding-top: 16px;
    border-top: 0.5px solid currentColor;
    font-size: 13px;
    opacity: 0.7;
  }
  .earn-card.us .term { opacity: 0.85; }
  .earn-card .term b { font-family: var(--serif); font-style: italic; font-weight: 500; }

  /* ────────── FAQ ────────── */
  .faq {
    background: var(--paper);
    border-bottom: 0.5px solid var(--rule);
  }
  .faq-tabs {
    display: inline-flex;
    border: 0.5px solid var(--rule);
    border-radius: 999px;
    padding: 4px;
    margin-bottom: 40px;
    background: #fbf8f1;
  }
  .faq-tab {
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    background: transparent;
    border: 0;
    color: var(--ink-mute);
    transition: all 0.25s var(--ease);
  }
  .faq-tab.active {
    background: var(--ink);
    color: var(--paper);
  }
  .faq-list {
    border-top: 0.5px solid var(--rule);
  }
  .faq-item {
    border-bottom: 0.5px solid var(--rule);
  }
  .faq-q {
    width: 100%;
    appearance: none; border: 0; background: transparent;
    padding: 28px 0;
    text-align: left;
    display: grid; grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: center;
    cursor: pointer;
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(18px, 1.5vw, 22px);
    letter-spacing: -0.012em;
    color: var(--ink);
  }
  .faq-q .tag {
    font-family: var(--sans); font-weight: 500;
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-mute);
    padding: 4px 8px;
    border: 0.5px solid var(--rule);
    border-radius: 4px;
  }
  .faq-q .plus {
    width: 24px; height: 24px;
    position: relative;
    transition: transform 0.3s var(--ease);
  }
  .faq-q .plus::before, .faq-q .plus::after {
    content: ""; position: absolute; left: 50%; top: 50%;
    background: var(--ink);
    transform: translate(-50%, -50%);
    transition: transform 0.3s var(--ease);
  }
  .faq-q .plus::before { width: 14px; height: 1px; }
  .faq-q .plus::after { width: 1px; height: 14px; }
  .faq-item.open .faq-q .plus::after { transform: translate(-50%, -50%) scaleY(0); }
  .faq-a {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.4s var(--ease);
  }
  .faq-item.open .faq-a { max-height: 400px; }
  .faq-a-inner {
    padding: 0 0 28px;
    max-width: 760px;
    font-size: 15px; line-height: 1.6;
    color: var(--ink-mute);
  }
  .faq-q .qrow { display: flex; align-items: center; gap: 14px; }

  /* ────────── Final CTA mirror ────────── */
  .final {
    display: grid; grid-template-columns: 1fr 1fr;
    min-height: 60vh;
  }
  .final-half {
    padding: 9vh 6vw;
    display: flex; flex-direction: column; justify-content: center;
    gap: 28px;
    position: relative;
    transition: filter 0.4s var(--ease);
  }
  .final-half:hover { filter: brightness(1.06); }
  .final-half.tutor { background: var(--tutor-bg); color: var(--tutor-ink); }
  .final-half.parent { background: var(--parent-bg); color: var(--parent-ink); }
  .final-half h2 {
    font-family: var(--serif); font-weight: 350;
    font-size: clamp(30px, 3vw, 48px);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin: 0;
    text-wrap: balance;
  }
  .final-half .arr-link {
    display: inline-flex; align-items: center; gap: 14px;
    font-family: var(--serif);
    font-size: clamp(22px, 2vw, 30px);
    font-style: italic; font-weight: 400;
    width: fit-content;
    padding: 14px 0;
    border-bottom: 0.5px solid currentColor;
    transition: gap 0.3s var(--ease);
  }
  .final-half.tutor .arr-link { color: var(--tutor-accent); }
  .final-half.parent .arr-link { color: var(--parent-accent); }
  .final-half .arr-link:hover { gap: 24px; }

  /* ────────── Footer ────────── */
  footer {
    background: var(--ink);
    color: rgba(245,241,234,0.65);
    padding: 60px 6vw 32px;
  }
  .foot-grid {
    display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr;
    gap: 40px;
    max-width: 1280px; margin: 0 auto;
  }
  .foot-grid h5 {
    font-family: var(--sans);
    font-weight: 500;
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(245,241,234,0.4);
    margin: 0 0 16px;
  }
  .foot-grid ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; font-size: 13.5px; }
  .foot-grid ul a:hover { color: var(--paper); }
  .foot-brand {
    font-family: var(--serif); font-weight: 500;
    font-size: 24px;
    color: var(--paper);
    margin-bottom: 14px;
    letter-spacing: -0.01em;
  }
  .foot-blurb { font-size: 13.5px; line-height: 1.55; max-width: 320px; }
  .foot-bottom {
    max-width: 1280px; margin: 56px auto 0;
    padding-top: 24px;
    border-top: 0.5px solid rgba(255,255,255,0.08);
    display: flex; justify-content: space-between;
    font-size: 11.5px;
    color: rgba(245,241,234,0.4);
  }

  /* ────────── Reveal animations ────────── */
  .reveal {
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 0.7s var(--ease), transform 0.7s var(--ease);
  }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal.d1 { transition-delay: 0.08s; }
  .reveal.d2 { transition-delay: 0.16s; }
  .reveal.d3 { transition-delay: 0.24s; }
  .reveal.d4 { transition-delay: 0.32s; }

  @media (prefers-reduced-motion: reduce) {
    .reveal { transform: none !important; }
    .hero-half, .hero.lean-left .hero-half, .hero.lean-right .hero-half { transition: none !important; flex: 1 1 50% !important; filter: none !important; }
    .float-chip { transition: opacity 0.25s linear !important; transform: none !important; }
    .hero-half.engaged .float-chip { transform: none !important; }
    * { animation-duration: 0.01ms !important; }
  }

  /* ────────── Mobile ────────── */
  @media (max-width: 900px) {
    .hero { flex-direction: column; height: auto; min-height: 0; }
    .hero-half { min-height: 50vh; flex: 1 1 auto !important; filter: none !important; }
    .hero-content { padding: 12vh 8vw 8vh; max-width: 100%; }
    .hero-half.parent .hero-content { margin-left: 0; padding-left: 8vw; }
    .divider { display: none; }
    .wordmark-center { top: 18px; }
    .hero-foot { display: none; }
    .float-chip.f3 { display: none; }

    .mechanic-grid { grid-template-columns: 1fr; }
    .step { border-right: 0; border-bottom: 0.5px solid var(--rule); }
    .step:last-child { border-bottom: 0; }

    .how-grid { grid-template-columns: 1fr; }
    .trust-grid { grid-template-columns: 1fr 1fr; }
    .tutor-grid { grid-template-columns: 1fr 1fr; }
    .earn-grid { grid-template-columns: 1fr; }
    .final { grid-template-columns: 1fr; }
    .foot-grid { grid-template-columns: 1fr 1fr; }
    .guarantee-card { grid-template-columns: 1fr; text-align: left; gap: 20px; }

    .compare-row { grid-template-columns: 1fr; }
    .compare-row > div { border-right: 0 !important; border-bottom: 0.5px solid var(--rule); }
    .compare-row > div:last-child { border-bottom: 0; }
  }
  @media (max-width: 560px) {
    .trust-grid { grid-template-columns: 1fr; }
    .tutor-grid { grid-template-columns: 1fr; }
    .foot-grid { grid-template-columns: 1fr; }
    .stickybar { padding: 10px 16px; }
    .stickybar .ctas .pill.ghost { display: none; }
  }
</style>
</head>
